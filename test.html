<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background: #f9fafb; font-size: 13px; color: #6b7280; }
    .sensitive { background: #fef3c7; padding: 2px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Employee List</h1>
  <p>Elements with class <code>.sensitive</code> will be blurred in screenshots.</p>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Salary</th>
        <th>Department</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Jane Smith</td>
        <td class="sensitive">jane.smith@example.com</td>
        <td class="sensitive">$95,000</td>
        <td>Engineering</td>
      </tr>
      <tr>
        <td>Bob Johnson</td>
        <td class="sensitive">bob.j@example.com</td>
        <td class="sensitive">$82,000</td>
        <td>Marketing</td>
      </tr>
      <tr>
        <td>Alice Chen</td>
        <td class="sensitive">alice.c@example.com</td>
        <td class="sensitive">$105,000</td>
        <td>Engineering</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
