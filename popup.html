<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }

    h1 {
      font-size: 14px;
      margin: 0 0 12px;
    }

    .buttons {
      display: flex;
      gap: 6px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      min-height: 18px;
    }

    .settings { margin-bottom: 12px; }

    label {
      font-size: 12px;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    input[type="range"] { flex: 1; }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .range-value {
      font-size: 11px;
      color: #6b7280;
      min-width: 30px;
      text-align: right;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 12px 0 6px;
    }

    .detectors {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }

    .detector {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      background: white;
      color: #374151;
      cursor: pointer;
      transition: all 0.1s;
      width: auto;
      font-weight: 500;
    }

    .detector.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 12px 0;
    }

    .output-toggle {
      display: flex;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .output-toggle button {
      flex: 1;
      padding: 6px 8px;
      border: none;
      background: white;
      color: #374151;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
    }

    .output-toggle button.active {
      background: #2563eb;
      color: white;
    }

    .output-toggle button:not(:last-child) {
      border-right: 1px solid #d1d5db;
    }
  </style>
</head>
<body>
  <h1>Sensitive Blur Screenshot</h1>

  <div class="settings">
    <label>Blur strength</label>
    <div class="range-row">
      <input type="range" id="blur-strength" min="2" max="20" value="8">
      <span class="range-value" id="blur-value">8px</span>
    </div>
  </div>

  <div class="section-label">Auto-detect</div>
  <div class="detectors">
    <button class="detector active" data-detector="dollars">$ Amounts</button>
    <button class="detector active" data-detector="emails">Emails</button>
    <button class="detector active" data-detector="phones">Phones</button>
    <button class="detector active" data-detector="tfn">TFN</button>
    <button class="detector active" data-detector="ird">IRD</button>
    <button class="detector active" data-detector="tableNames">Names (tables)</button>
  </div>

  <hr class="divider">

  <div class="section-label">Output</div>
  <div class="output-toggle">
    <button class="active" data-mode="clipboard">Copy to Clipboard</button>
    <button data-mode="download">Download</button>
  </div>

  <div class="buttons">
    <button class="btn btn-primary" id="capture-full">Full Page</button>
    <button class="btn btn-secondary" id="capture-area">Select Area</button>
  </div>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
