<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }

    h1 {
      font-size: 14px;
      margin: 0 0 12px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: default; }

    #capture {
      background: #2563eb;
      color: white;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      min-height: 18px;
    }

    .settings {
      margin-bottom: 12px;
    }

    label {
      font-size: 12px;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    input[type="range"] {
      flex: 1;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .range-value {
      font-size: 11px;
      color: #6b7280;
      min-width: 30px;
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>Sensitive Blur Screenshot</h1>

  <div class="settings">
    <label>
      Blur strength
    </label>
    <div class="range-row">
      <input type="range" id="blur-strength" min="2" max="20" value="8">
      <span class="range-value" id="blur-value">8px</span>
    </div>
  </div>

  <button id="capture">Take Screenshot</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
